<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard — penguinprotector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="cyber">
    <div id="weather-bg"></div>
    <canvas id="bg-canvas"></canvas>

    <header>
<h1 data-text="Weather Dashboard">Weather Dashboard</h1>
        <p class="subtitle">Real-Time Conditions &amp; 5-Day Forecast</p>
    </header>

    <main>
        <!-- Search bar -->
        <section class="search-section">
            <div class="search-row">
                <input id="city-input" type="text" placeholder="City or City, Country (e.g. Portland, US)…" autocomplete="off" />
                <button id="geo-btn" title="Use my location">📍</button>
                <button id="search-btn">Get Weather</button>
            </div>

            <!-- Controls row: unit toggle + theme picker + mode toggle -->
            <div class="search-controls-row">
                <button id="mode-toggle" class="mode-toggle" title="Switch to light mode">☀</button>
                <div class="unit-toggle">
                    <label class="radio-label">
                        <input type="radio" name="units" value="imperial" checked />
                        <span>°F</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="units" value="metric" />
                        <span>°C</span>
                    </label>
                </div>
                <div class="theme-picker">
                    <button class="theme-dot active" data-theme="cyber"    title="Cyber"    style="--dot: rgb(0,243,255)"></button>
                    <button class="theme-dot"        data-theme="ember"    title="Ember"    style="--dot: rgb(255,160,0)"></button>
                    <button class="theme-dot"        data-theme="aurora"   title="Aurora"   style="--dot: rgb(130,80,255)"></button>
                    <button class="theme-dot"        data-theme="verdant"  title="Verdant"  style="--dot: rgb(0,230,100)"></button>
                    <button class="theme-dot"        data-theme="crimson"  title="Crimson"  style="--dot: rgb(255,60,100)"></button>
                    <button class="theme-dot"        data-theme="blush"    title="Blush"    style="--dot: rgb(255,160,180)"></button>
                    <button class="theme-dot"        data-theme="sky"      title="Sky"      style="--dot: rgb(120,190,255)"></button>
                    <button class="theme-dot"        data-theme="sage"     title="Sage"     style="--dot: rgb(140,200,150)"></button>
                    <button class="theme-dot"        data-theme="lavender" title="Lavender" style="--dot: rgb(195,165,255)"></button>
                </div>
            </div>

            <!-- Search history -->
            <div id="history-row" class="history-row" hidden></div>
        </section>

        <!-- Error message -->
        <p id="error-msg" class="error-msg" hidden></p>

        <!-- Loading spinner -->
        <div id="loader" class="loader" hidden>
            <div class="spinner"></div>
        </div>

        <!-- Current weather card -->
        <section id="current-card" class="current-card" hidden>
            <div class="current-top">
                <div class="current-left">
                    <div id="city-name" class="city-name"></div>
                    <div id="weather-desc" class="weather-desc"></div>
                    <div class="temp-row">
                        <img id="weather-icon" class="weather-icon" src="" alt="" />
                        <span id="temperature" class="temperature"></span>
                    </div>
                    <div id="feels-like" class="feels-like"></div>
                </div>
                <div class="current-right">
                    <div class="stat-grid">
                        <div class="stat">
                            <span class="stat-label">Humidity</span>
                            <span id="humidity" class="stat-value"></span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Wind</span>
                            <span id="wind" class="stat-value"></span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Pressure</span>
                            <span id="pressure" class="stat-value"></span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Visibility</span>
                            <span id="visibility" class="stat-value"></span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Sunrise</span>
                            <span id="sunrise" class="stat-value"></span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Sunset</span>
                            <span id="sunset" class="stat-value"></span>
                        </div>
                        <div class="stat aqi-stat-cell" id="aqi-stat" hidden>
                            <span class="stat-label">Air Quality</span>
                            <div class="aqi-readout">
                                <span id="aqi-value" class="aqi-num"></span>
                                <span id="aqi-word" class="aqi-word"></span>
                            </div>
                            <div class="aqi-bar" id="aqi-bar">
                                <div class="aqi-seg" data-i="1"></div>
                                <div class="aqi-seg" data-i="2"></div>
                                <div class="aqi-seg" data-i="3"></div>
                                <div class="aqi-seg" data-i="4"></div>
                                <div class="aqi-seg" data-i="5"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 5-Day Forecast -->
        <section id="forecast-section" class="forecast-section" hidden>
            <h2 class="section-title">5-Day Forecast</h2>
            <div id="forecast-cards" class="forecast-cards"></div>
        </section>
    </main>

    <footer>AIML-1870-2026 · penguinprotector</footer>

    <script src="app.js"></script>
</body>
</html>
